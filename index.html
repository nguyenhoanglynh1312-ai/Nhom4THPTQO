<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Du lịch Hà Nội</title>
    <style>
        body {margin:0;font-family:Arial;background:#f0f2f5;}
        header {
            background: linear-gradient(90deg,#4facfe,#00f2fe);
            color:white;text-align:center;padding:30px;
        }
        nav {background:white;padding:15px;text-align:center; border-bottom: 1px solid #ddd;}
        nav a {margin:0 15px;text-decoration:none;font-weight:bold;color:#333;}
        nav a:hover {color:#4facfe;}
        
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 20px;
        }

        .card {
            background:white;
            margin:20px 0;
            padding:25px;
            width:90%;
            max-width:700px; 
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        img {
            width:100%;
            max-width:600px;
            height:auto;
            border-radius:10px;
            display: block;
            margin: 0 auto;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            margin-top: 15px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        footer {background:#333;color:white;text-align:center;padding:20px; margin-top: 40px;}
    </style>
</head>

<body>

<header>
    <h1>KHÁM PHÁ ẨM THỰC HÀ NỘI</h1>
    <p>Nhóm 4 - THPT Quốc Oai</p>
</header>

<nav>
    <a href="index.html">Trang chủ</a>
    <a href="about.html">Giới thiệu</a>
    <a href="contact.html">Liên hệ</a>
</nav>

<div class="main-content">
    
    <div class="card">
        <h2>Hồ Gươm Lung Linh</h2>
        <img src="https://cdn.pixabay.com/photo/2016/11/13/12/52/hanoi-1820935_1280.jpg" alt="Hồ Gươm">
        <p><i>Trái tim thiêng liêng của Hà Nội</i></p>
    </div>

    <div class="card">
        <h2>Phở Hà Nội</h2>
        <img src="https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80" alt="Phở Hà Nội">
        <p><i>Hương vị không thể quên khi đến Thủ đô</i></p>
    </div>

    <div class="card">
        <h2>Video Khám Phá</h2>
        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/aPYAUdPa7V4" 
                title="YouTube video player" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</div>

<footer>
    <p>Nhóm 4 - 2026 | THPT Quốc Oai</p>
</footer>

</body>
</html>
