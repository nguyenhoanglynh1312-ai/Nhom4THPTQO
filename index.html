<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Du lịch Hà Nội</title>
    <style>
        body {margin:0;font-family:Arial, sans-serif;background:#f0f2f5;}
        header {
            background: linear-gradient(90deg,#4facfe,#00f2fe);
            color:white;text-align:center;padding:30px;
        }
        nav {background:white;padding:15px;text-align:center; border-bottom: 1px solid #ddd;}
        nav a {margin:0 15px;text-decoration:none;font-weight:bold;color:#333;}
        nav a:hover {color:#4facfe;}
        
        /* Căn giữa toàn bộ nội dung */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 20px;
        }

        .card {
            background:white;
            margin:20px 0;
            padding:25px;
            width:90%;
            max-width:700px; 
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        img {
            width:100%;
            max-width:600px;
            height:auto;
            border-radius:10px;
            display: block;
            margin: 0 auto;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            margin-top: 15px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        footer {background:#333;color:white;text-align:center;padding:20px; margin-top: 40px;}
    </style>
</head>

<body>

<header>
    <h1>KHÁM PHÁ ẨM THỰC HÀ NỘI</h1>
    <p>Văn hóa - Ẩm thực - Du lịch</p>
</header>

<nav>
    <a href="index.html">Trang chủ</a>
    <a href="about.html">Giới thiệu</a>
    <a href="contact.html">Liên hệ</a>
</nav>

<div class="main-content">
    
    <div class="card">
        <h2>Cảnh đẹp Hà Nội</h2>
        <p>Hồ Hoàn Kiếm - Trái tim của Thủ đô</p>
        <a href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Hồ_Gươm_về_đêm.jpg/1024px-Hồ_Gươm_về_đêm.jpg" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Hồ_Gươm_về_đêm.jpg/1024px-Hồ_Gươm_về_đêm.jpg" alt="Hồ Hoàn Kiếm">
        </a>
    </div>

    <div class="card">
        <h2>Ẩm thực Hà Nội</h2>
        <p>Phở Hà Nội - Tinh hoa ẩm thực Việt</p>
        <a href="https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Pho_Hanoi_Street_Scene.jpg/1024px-Pho_Hanoi_Street_Scene.jpg" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Pho_Hanoi_Street_Scene.jpg/1024px-Pho_Hanoi_Street_Scene.jpg" alt="Phở Hà Nội">
        </a>
    </div>

    <div class="card">
        <h2>Video Khám phá Ẩm thực</h2>
        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/aPYAUdPa7V4" 
                title="YouTube video player" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</div>

<footer>
    <p>Nhóm 4 - 2026 | THPT Quốc Oai</p>
</footer>

</body>
</html>
