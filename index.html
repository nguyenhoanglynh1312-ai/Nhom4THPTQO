<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Du lịch Hà Nội - Nhóm 4</title>
    <style>
        body {margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; color: #333;}
        header {
            background: linear-gradient(90deg,#4facfe,#00f2fe);
            color:white; text-align:center; padding:40px 20px;
        }
        nav {background:white; padding:15px; text-align:center; position: sticky; top:0; z-index:100; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
        nav a {margin:0 15px; text-decoration:none; font-weight:bold; color:#333; transition: 0.3s;}
        nav a:hover {color:#4facfe;}
        
        .main-content {
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        .card {
            background:white; margin:20px 0; padding:20px; width:95%; max-width:700px; 
            border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:center;
        }

        h2 { color: #2c3e50; margin-bottom: 15px; }

        /* Quan trọng: Đảm bảo ảnh luôn hiện */
        .hanoi-img {
            width:100%; max-width:600px; height:auto; border-radius:10px;
            display: block; margin: 10px auto;
            background: #eee; /* Hiện nền xám nếu mạng yếu */
        }

        footer {background:#333; color:white; text-align:center; padding:20px; margin-top: 40px;}
    </style>
</head>
<body>

<header>
    <h1>KHÁM PHÁ HÀ NỘI</h1>
    <p>Nhóm 4 - THPT Quốc Oai | 2026</p>
</header>

<nav>
    <a href="index.html">Trang chủ</a>
    <a href="about.html">Giới thiệu</a>
    <a href="contact.html">Liên hệ</a>
</nav>

<div class="main-content">
    
    <div class="card">
        <h2>Hồ Hoàn Kiếm</h2>
        <img class="hanoi-img" src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=800&q=80" alt="Ho Guom">
        <p>Vẻ đẹp yên bình giữa lòng thủ đô.</p>
    </div>

    <div class="card">
        <h2>Phở Hà Nội</h2>

        <p>Món ăn linh hồn của người Việt.</p>
    </div>

    </div>

    <div class="card">
